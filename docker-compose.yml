services:
  promptvault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promptvault
    restart: unless-stopped
    ports:
      - "8090:6100"
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:6100/api/categories').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
