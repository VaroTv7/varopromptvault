services:
  promptvault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promptvault
    restart: unless-stopped
    ports:
      - "8090:3000"
    volumes:
      - ./data:/app/data
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/categories" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - varonet

networks:
  varonet:
    external: true
